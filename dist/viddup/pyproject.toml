[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "viddup"
version = "0.2.0"
description = "Duplicate video scene finder"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "imageio",
    "numpy",
    "PyYAML",
    "scipy",
    "tqdm",
]

[project.optional-dependencies]
annoy = ["annoy"]
hnswlib = ["hnswlib"]
cyflann = ["cyflann"]
faiss = ["faiss-cpu"]
pynndescent = ["pynndescent"]
sklearn = ["scikit-learn"]
knn-extra = ["faiss-cpu", "pynndescent", "scikit-learn"]
test = ["pytest"]

[project.scripts]
dupfind = "viddup.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
